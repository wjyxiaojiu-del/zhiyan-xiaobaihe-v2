{% extends "base.html" %}
{% set active = "search" %}

{% block title %}Protocol检索 - 植研小白盒{% endblock %}

{% block content %}
<!-- Hero区域 -->
<section style="background:linear-gradient(135deg,#A85C25 0%,#D4793A 30%,#E89B5E 60%,#F0B87A 100%);color:white;padding:2rem 2rem 1.5rem;text-align:center;">
  <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:0.3rem;">🔍 Protocol检索</h1>
  <p style="opacity:0.9;font-size:1rem;">输入实验关键词，匹配最相关的Protocol</p>
</section>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="例：可溶性糖 叶绿素 SOD 酶活性 DNA提取 呼吸速率..."
               onkeydown="if(event.key==='Enter')doSearch()" autofocus>
        <button onclick="doSearch()">检索</button>
    </div>

    <!-- 筛选栏 -->
    <div style="display:flex;gap:0.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;">
        <select id="filterCategory" onchange="doSearch()" style="padding:0.4rem 0.8rem;border:2px solid var(--border);border-radius:8px;font-size:0.85rem;background:white;cursor:pointer;">
            <option value="">全部分类</option>
            <option value="植物生理">植物生理</option>
            <option value="分子生物">分子生物</option>
            <option value="基础操作">基础操作</option>
        </select>
        <select id="filterDifficulty" onchange="doSearch()" style="padding:0.4rem 0.8rem;border:2px solid var(--border);border-radius:8px;font-size:0.85rem;background:white;cursor:pointer;">
            <option value="">全部难度</option>
            <option value="1">⭐ 入门</option>
            <option value="2">⭐⭐ 基础</option>
            <option value="3">⭐⭐⭐ 进阶</option>
        </select>
        <select id="sortBy" onchange="doSearch()" style="padding:0.4rem 0.8rem;border:2px solid var(--border);border-radius:8px;font-size:0.85rem;background:white;cursor:pointer;">
            <option value="relevance">按相关度</option>
            <option value="favorites">按收藏数</option>
            <option value="rating">按评分</option>
            <option value="difficulty">按难度</option>
        </select>
    </div>

    <div id="searchResults"></div>

    <!-- 热门搜索 -->
    <div style="margin-top:2rem;">
        <h3 style="font-size:1rem; color:#607D8B; margin-bottom:0.8rem;">热门搜索</h3>
        <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">
            <button class="quick-btn" onclick="quickSearch('可溶性糖')">可溶性糖</button>
            <button class="quick-btn" onclick="quickSearch('叶绿素')">叶绿素</button>
            <button class="quick-btn" onclick="quickSearch('蛋白质含量')">蛋白质</button>
            <button class="quick-btn" onclick="quickSearch('MDA 丙二醛')">MDA</button>
            <button class="quick-btn" onclick="quickSearch('SOD 超氧物歧化酶')">SOD</button>
            <button class="quick-btn" onclick="quickSearch('DNA提取')">DNA提取</button>
            <button class="quick-btn" onclick="quickSearch('呼吸速率')">呼吸速率</button>
            <button class="quick-btn" onclick="quickSearch('电泳')">电泳</button>
            <button class="quick-btn" onclick="quickSearch('植物激素')">植物激素</button>
            <button class="quick-btn" onclick="quickSearch('根系活力')">根系活力</button>
        </div>
    </div>

    <!-- 全部Protocol浏览 -->
    <div style="margin-top:2.5rem;">
        <h3 style="font-size:1rem; color:#607D8B; margin-bottom:0.8rem;">全部Protocol（点击直接查看）</h3>
        <div style="display:flex; flex-wrap:wrap; gap:0.4rem;">
            {% for p in protocols %}
            <a href="/protocol/{{ p.id }}" class="browse-tag" title="{{ p.desc }}">
                {{ p.id }} {{ p.name[:12] }}
            </a>
            {% endfor %}
        </div>
    </div>
</div>

<style>
.quick-btn {
    padding: 0.4rem 1rem;
    border: 2px solid #E4DFD6;
    background: white;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    color: #8C7E6E;
}
.quick-btn:hover { border-color: #E89B5E; color: #D4793A; background: #F0EDE6; }

.browse-tag {
    display: inline-block;
    padding: 0.25rem 0.6rem;
    background: #FAFAF5;
    border: 1px solid #E4DFD6;
    border-radius: 6px;
    font-size: 0.75rem;
    color: #6B5D4E;
    text-decoration: none;
    transition: all 0.2s;
}
.browse-tag:hover { background: #F0EDE6; border-color: #E89B5E; color: #D4793A; }

.search-result-card {
    display: block;
    background: #FDFCFA;
    border-radius: 12px;
    padding: 1rem 1.5rem;
    margin-bottom: 0.75rem;
    box-shadow: 0 1px 6px rgba(80,65,45,0.06);
    text-decoration: none;
    color: #3D3225;
    transition: box-shadow 0.2s;
    border-left: 4px solid transparent;
}
.search-result-card:hover {
    box-shadow: 0 4px 16px rgba(80,65,45,0.12);
    border-left-color: #E89B5E;
}
.result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
}
.result-name {
    font-weight: 700;
    font-size: 1rem;
    color: #D4793A;
}
.result-category {
    font-size: 0.75rem;
    background: rgba(212,121,58,0.1);
    color: #D4793A;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
}
.result-desc {
    font-size: 0.85rem;
    color: #8C7E6E;
    margin-bottom: 0.4rem;
}
.result-snippet {
    font-size: 0.8rem;
    color: #A09080;
    border-left: 3px solid #E4DFD6;
    padding-left: 0.5rem;
    margin-top: 0.3rem;
}
.result-score {
    font-size: 0.7rem;
    color: #B8A88C;
}
</style>

<script>
function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    doSearch();
}

function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    const category = document.getElementById('filterCategory').value;
    const difficulty = document.getElementById('filterDifficulty').value;
    const sort = document.getElementById('sortBy').value;

    const container = document.getElementById('searchResults');
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#607D8B;">检索中...</div>';

    fetch('/api/search', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ query, category, difficulty, sort })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.results || data.results.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:2rem;color:#607D8B;">未找到相关Protocol，换个关键词试试</div>';
            return;
        }

        let html = '<div style="margin-top:1.5rem;">';
        html += '<p style="color:#607D8B;font-size:0.85rem;margin-bottom:0.8rem;">找到 ' + data.results.length + ' 个相关Protocol</p>';
        data.results.forEach(r => {
            const href = r.protocol_id ? '/protocol/' + r.protocol_id : '#';
            const diffStars = '⭐'.repeat(r.difficulty || 1);
            html += '<a href="' + href + '" class="search-result-card">';
            html += '<div class="result-header">';
            html += '<span class="result-name">' + r.protocol_id + ' ' + r.protocol_name + '</span>';
            html += '<div style="display:flex;gap:0.4rem;align-items:center;">';
            if (r.favorites > 0) html += '<span style="font-size:0.75rem;color:#F44336;">❤️' + r.favorites + '</span>';
            if (r.avg_rating > 0) html += '<span style="font-size:0.75rem;color:#F57F17;">★' + r.avg_rating + '</span>';
            html += '<span class="result-category">' + r.category + '</span>';
            html += '<span style="font-size:0.7rem;color:#B8A88C;">' + diffStars + '</span>';
            html += '</div></div>';
            if (r.desc) html += '<div class="result-desc">' + r.desc + '</div>';
            if (r.snippet) html += '<div class="result-snippet">' + r.snippet + '</div>';
            html += '</a>';
        });
        html += '</div>';
        container.innerHTML = html;
    })
    .catch(e => {
        container.innerHTML = '<div style="text-align:center;padding:2rem;color:#F44336;">检索失败：' + e.message + '</div>';
    });
}
</script>
{% endblock %}
